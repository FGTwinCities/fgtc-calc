{% extends "build/create.html" %}

{% block title %}Create Modern Build{% endblock %}
{% block form_action %}/build/modern{% endblock %}

{% block basic_info %}
    <label class="floating-label">
        <span class="label">Manufacturer</span>
        <input type="text" name="manufacturer" id="manufacturer" placeholder="Manufacturer" class="input">
    </label>
    <label class="floating-label">
        <span class="label">Model</span>
        <input type="text" name="model" id="model" placeholder="Model" class="input">
    </label>
    <label class="floating-label">
        <span class="label">Operating System</span>
        <input type="text" name="operating-system" id="operating-system" placeholder="Operating System" class="input" list="operating-system-results" autocomplete="off">
        <datalist id="operating-system-results"></datalist>
    </label>
{% endblock %}
