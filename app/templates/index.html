{% extends "base.html" %}

{% block title %}Homepage{% endblock %}

{% block extra_head %}
    {{ vite('src/recentBuilds.js') }}
{% endblock %}

{% block content %}
<template id="pricing-breakdown-template">
    <dialog id="pricing-breakdown" class="modal">
        <div class="modal-box">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <span class="text-3xl">Pricing Result</span>
            <table id="table" class="table table-zebra mt-4">
                    <thead>
                        <tr>
                            <td>Component</td>
                            <td class="text-right">Price</td>
                            <td class="text-right">Total</td>
                        </tr>
                    </thead>
                    <tr></tr><tr></tr>
                <template id="row-template">
                    <tr>
                        <td id="label"></td>
                        <td id="price-delta" class="text-right"></td>
                        <td id="price-total" class="text-right"></td>
                    </tr>
                </template>
            </table>
            <div class="mt-8 flex flex-row gap-4">
                <label class="self-center text-3xl"><span>Total:</span></label>
                <label class="input join-item text-2xl">
                    <span class="label">$</span>
                    <input id="pricing-breakdown-price" class="font-bold" type="number">
                </label>
                <button id="pricing-breakdown-setprice-btn" class="btn btn-primary join-item text-l">Set Price</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
</template>
<div class="flex justify-center mt-24 mb-24 gap-8">
    <a class="btn btn-xl btn-primary" href="/build/modern/create">Create New Modern Build</a>
    <a class="btn btn-xl btn-primary" href="/build/mac/create">Create New Mac Build</a>
</div>
<div class="ml-12 mr-12">
    <div class="join join-vertical bg-base-200 w-full">
        <div class="join-item border-base-300 border p-4 flex flex-row">
            <h1 class="text-2xl">Recent Builds</h1>
            <form class="text-right grow" id="recents-filter">
                <span class="text-l mr-2">Show:</span>
                <input class="btn" type="checkbox" name="recents-modern" aria-label="Modern" checked/>
                <input class="btn" type="checkbox" name="recents-mac" aria-label="Mac" checked/>
            </form>
        </div>
        <div id="recent-builds-list" page="0" total-pages="0"></div>
        <div class="join self-center m-2">
            <button class="join-item btn" id="page-prev">«</button>
            <button class="join-item btn btn-disabled" id="page-current">Page X</button>
            <button class="join-item btn" id="page-next">»</button>
        </div>
        <template id="recent-build-entry-template">
            <div class="build-entry collapse collapse-arrow join-item border-base-300 border">
                <input type="radio" name="recent-builds-accordian" checked="checked" />
                <div class="collapse-title flex flex-row">
                    <p class="font-semibold text-2xl" id="entry-title"></p>
                    <p class="self-center text-xl ml-8 text-base-content/25 font-mono" id="entry-subtitle"></p>
                    <p class="self-center text-right grow" id="entry-timestamp"></p>
                </div>
                <div class="collapse-content">
                    <div class="pb-4">
                        <span class="text-l font-semibold">Price: </span><span id="entry-price"></span>
                    </div>
                    <div class="flex flex-auto gap-4">
                        <div class="join bg-base-300 p-4 rounded-box">
                            <div class="join-item pr-8 self-center font-semibold text-lg">CPU</div>
                            <div class="join-item" id="entry-processors"></div>
                        </div>
                        <div class="join bg-base-300 p-4 rounded-box">
                            <div class="join-item pr-8 self-center font-semibold text-lg">Memory</div>
                            <div class="join-item" id="entry-memory"></div>
                        </div>
                        <div class="join bg-base-300 p-4 rounded-box">
                            <div class="join-item pr-8 self-center font-semibold text-lg">Storage</div>
                            <div class="join-item" id="entry-storage"></div>
                        </div>
                        <div class="join bg-base-300 p-4 rounded-box">
                            <div class="join-item pr-8 self-center font-semibold text-lg">Graphics</div>
                            <div class="join-item" id="entry-graphics"></div>
                        </div>
                    </div>
                    <div class="join mt-6">
                        <label class="input join-item">
                            <span class="label">$</span>
                            <input id="entry-set-price-field" type="number">
                        </label>
                        <button id="entry-set-price-button" class="btn btn-primary join-item rounded-r-full">Set Price</button>
                    </div>
                    <div class="mt-4 flex flex-row gap-4">
                        <button class="btn btn-primary" id="entry-generate-price-button">Generate Price</button>
                        <button class="btn btn-primary" id="entry-print-button">Print Buildsheet</button>
                        <a class="btn btn-warning" href="/build/%BUILDCLASS%/create?edit=%ID%">Edit</a>
                        <button class="btn btn-warning" id="entry-duplicate-button">Duplicate</button>
                        <button class="btn btn-error" id="entry-delete-button">Delete</button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
{% endblock %}
